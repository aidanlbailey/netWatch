<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>netWatch</title>
<style>
  body { font-family: system-ui, sans-serif; color: #222; max-width: 60rem; margin: 1.5rem auto; padding: 0 1rem; }
  header { display: flex; justify-content: space-between; align-items: baseline; }
  h1 { font-size: 1.3rem; margin: 0; }
  h2 { font-size: 1rem; margin: 2rem 0 .5rem; }
  .tablewrap { overflow-x: auto; }
  table { border-collapse: collapse; width: 100%; font-size: .9rem; }
  th, td { text-align: left; padding: .4rem .6rem; border-bottom: 1px solid #ddd; white-space: nowrap; }
  th { font-weight: 600; }
  tr.offline td { color: #999; }
  .nick { cursor: pointer; text-decoration: underline dotted; }
  .nick input { font: inherit; padding: .1rem .3rem; width: 9rem; }
  ul { padding-left: 1.2rem; font-size: .9rem; }
  li { margin: .2rem 0; }
  #detection { font-size: .9rem; }
  .det-on { color: #197; } .det-off { color: #a60; } .det-bad { color: #b00; }
  details { margin: 1rem 0; }
  summary { cursor: pointer; font-weight: 600; }
  .config-form { margin-top: .6rem; }
  .config-form label { display: block; margin: .4rem 0; }
  .config-form input, .config-form select { font: inherit; padding: .2rem; }
  .config-form fieldset { margin: .6rem 0; max-width: 22rem; }
  .config-form small { color: #777; }
  #cfgMsg { margin-left: .6rem; font-size: .9rem; }
</style>
</head>
<body>
<header>
  <h1>netWatch</h1>
  <div>
    <button id="testNotify" title="Send a test ping through the configured channels">Test notification</button>
    <button onclick="window.open('https://github.com/aidanlbailey/netWatch#readme')">Help</button>
    <form method="post" action="/logout" style="display:inline"><button>Log out</button></form>
  </div>
</header>
<p title="How many consecutive missed sweeps (one every 12 s) before a device is marked offline and a leave notification fires. 3-5 (about 1 min) is fine for always-on devices like cameras and smart plugs. 20-30 (about 4-6 min) is recommended if you track phones: they stop answering the network for short stretches while asleep, and lower values cause false leave alerts.">
  Mark offline after
  <input type="range" id="misses" min="1" max="50" step="1">
  <span id="missesLabel"></span>
</p>
<p title="Suppress all notifications between these hours (local time, 24h). Leave blank to disable.">
  Quiet hours
  <input type="number" id="quietStart" min="0" max="23" placeholder="start">
  &ndash;
  <input type="number" id="quietEnd" min="0" max="23" placeholder="end">
</p>
<p id="detection"></p>

<details id="configPanel">
  <summary>Settings (edit config)</summary>
  <div class="config-form">
    <label>Subnet <input id="cfgSubnet" placeholder="auto-detect"></label>
    <label>Scan interval (seconds) <input type="number" id="cfgInterval" min="2" max="3600"></label>
    <label>Enhanced detection
      <select id="cfgPassive">
        <option value="auto">Auto (use if available)</option>
        <option value="true">On</option>
        <option value="false">Off</option>
      </select>
      <small>(needs a restart to take effect)</small>
    </label>
    <label>Discord webhook URL <input id="cfgWebhook" size="40"></label>
    <label>Discord user ID <input id="cfgUserId"></label>
    <fieldset>
      <legend>Email (SMTP)</legend>
      <label>Host <input id="cfgSmtpHost"></label>
      <label>Port <input type="number" id="cfgSmtpPort"></label>
      <label>Username <input id="cfgSmtpUser"></label>
      <label>Password <input type="password" id="cfgSmtpPass" placeholder="(unchanged)"></label>
      <label>From <input id="cfgSmtpFrom"></label>
      <label>To <input id="cfgSmtpTo"></label>
    </fieldset>
    <button id="cfgSave">Save config</button>
    <span id="cfgMsg"></span>
  </div>
</details>

<h2>Devices</h2>
<p id="whosHome"></p>
<div class="tablewrap"><table>
  <thead><tr><th>Status</th><th>Nickname</th><th>IP</th><th>MAC</th><th>Vendor</th><th>First seen</th><th>Last seen</th><th>Notify<br><button id="notifyAll" title="Select or deselect all devices">all</button></th></tr></thead>
  <tbody id="devices"></tbody>
</table></div>
<h2>Recent activity</h2>
<ul id="events"></ul>
<script>
let serverNow = Date.now() / 1000;
let scanInterval = 12;

const slider = document.getElementById("misses");
const missesLabel = document.getElementById("missesLabel");

function missesText(v) {
  const s = v * scanInterval;
  return `${v} missed sweeps (~${s < 90 ? s + " s" : Math.round(s / 60) + " min"})`;
}

let lastDevices = [];
document.getElementById("testNotify").onclick = async () => {
  const res = await fetch("/api/test-notify", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: "{}",
  });
  const d = await res.json();
  alert(d.results.length
    ? d.results.map(r => r.channel + ": " + (r.error ? "FAILED - " + r.error : "sent")).join("\n")
    : "No notification channels configured. Add a Discord webhook or SMTP settings first.");
};

document.getElementById("notifyAll").onclick = async () => {
  const allOn = lastDevices.every(d => d.notify === 1);
  await fetch("/api/notify", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ mac: "*", notify: allOn ? 0 : 1 }),
  });
  refresh();
};

slider.addEventListener("input", () => { missesLabel.textContent = missesText(slider.value); });
slider.addEventListener("change", () => fetch("/api/settings", {
  method: "POST",
  headers: { "Content-Type": "application/json" },
  body: JSON.stringify({ offline_after_misses: Number(slider.value) }),
}));

const quietStart = document.getElementById("quietStart");
const quietEnd = document.getElementById("quietEnd");
function quietVal(el) { return el.value === "" ? null : Number(el.value); }
[quietStart, quietEnd].forEach(el => el.addEventListener("change", () => fetch("/api/settings", {
  method: "POST",
  headers: { "Content-Type": "application/json" },
  body: JSON.stringify({ offline_after_misses: Number(slider.value),
                         quiet_start: quietVal(quietStart), quiet_end: quietVal(quietEnd) }),
})));

const DETECTION = {
  active: ["Enhanced detection: on (instant joins via passive sniffing)", "det-on"],
  disabled: ["Enhanced detection: off — turn it on in Settings below", "det-off"],
  unavailable: ["Enhanced detection: unavailable — run  pip install scapy  (plus Npcap on Windows), then restart the service", "det-bad"],
};
function renderDetection(status) {
  const el = document.getElementById("detection");
  const [text, cls] = DETECTION[status] || ["", ""];
  el.textContent = text;
  el.className = cls;
}

// Config editor: load into fields the first time the panel opens, save on button.
const configPanel = document.getElementById("configPanel");
let configLoaded = false;
configPanel.addEventListener("toggle", () => {
  if (configPanel.open && !configLoaded) { loadConfig(); configLoaded = true; }
});
async function loadConfig() {
  const res = await fetch("/api/config");
  if (res.status === 401) { location = "/login"; return; }
  const c = await res.json();
  cfgSubnet.value = c.subnet || "";
  cfgInterval.value = c.scan_interval_sec;
  cfgPassive.value = String(c.passive);
  cfgWebhook.value = c.discord.webhook_url || "";
  cfgUserId.value = c.discord.mention_user_id || "";
  cfgSmtpHost.value = c.smtp.host || "";
  cfgSmtpPort.value = c.smtp.port || "";
  cfgSmtpUser.value = c.smtp.username || "";
  cfgSmtpFrom.value = c.smtp.from_addr || "";
  cfgSmtpTo.value = c.smtp.to_addr || "";
  cfgSmtpPass.placeholder = c.smtp.password_set ? "(unchanged — leave blank to keep)" : "(none)";
}
document.getElementById("cfgSave").onclick = async () => {
  const passive = { auto: "auto", true: true, false: false }[cfgPassive.value];
  const body = {
    subnet: cfgSubnet.value, scan_interval_sec: Number(cfgInterval.value), passive,
    webhook_url: cfgWebhook.value, mention_user_id: cfgUserId.value,
    smtp: { host: cfgSmtpHost.value, port: Number(cfgSmtpPort.value) || 587,
            username: cfgSmtpUser.value, from_addr: cfgSmtpFrom.value, to_addr: cfgSmtpTo.value,
            password: cfgSmtpPass.value },
  };
  const res = await fetch("/api/config", {
    method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body),
  });
  const r = await res.json();
  const msg = document.getElementById("cfgMsg");
  msg.textContent = res.ok
    ? (r.restart_needed ? "Saved. Restart the service for subnet/detection changes to apply." : "Saved.")
    : ("Error: " + (r.error || res.status));
  cfgSmtpPass.value = "";
};

function ago(ts) {
  const s = Math.max(0, serverNow - ts);
  if (s < 60) return "just now";
  if (s < 3600) return Math.floor(s / 60) + " min ago";
  if (s < 86400) return Math.floor(s / 3600) + " h ago";
  return Math.floor(s / 86400) + " d ago";
}

function td(text, cls) {
  const el = document.createElement("td");
  el.textContent = text ?? "";
  if (cls) el.className = cls;
  return el;
}

function name(d) {
  return d.nickname || d.auto_name || d.vendor || d.mac;
}

function duration(secs) {
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  return `${h}h ${m}m`;
}

let expandedMac = null;

function historyRow(events) {
  const tr = document.createElement("tr");
  tr.id = "historyRow";
  const cell = document.createElement("td");
  cell.colSpan = 8;
  const ul = document.createElement("ul");
  events.forEach((e, i) => {
    const li = document.createElement("li");
    let text = `${e.kind === "join" ? "Joined" : "Left"} — ${ago(e.ts)}`;
    if (e.kind === "leave" && events[i + 1] && events[i + 1].kind === "join") {
      text += ` (online ${duration(e.ts - events[i + 1].ts)})`;
    }
    li.textContent = text;
    ul.append(li);
  });
  cell.append(ul.children.length ? ul : document.createTextNode("No history yet."));
  tr.append(cell);
  return tr;
}

async function renderExpansion() {
  const existing = document.getElementById("historyRow");
  if (existing) existing.remove();
  if (!expandedMac) return;
  const row = document.querySelector(`tr[data-mac="${expandedMac}"]`);
  if (!row) return;
  const res = await fetch(`/api/history/${expandedMac}`);
  if (res.status === 401) { location = "/login"; return; }
  const events = await res.json();
  if (expandedMac !== row.dataset.mac) return;
  row.after(historyRow(events));
}

function toggleHistory(mac) {
  expandedMac = expandedMac === mac ? null : mac;
  renderExpansion();
}

function editNickname(cell, dev) {
  const input = document.createElement("input");
  input.value = dev.nickname || "";
  cell.replaceChildren(input);
  input.focus();
  let done = false;
  const save = async () => {
    if (done) return; done = true;
    await fetch("/api/nickname", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ mac: dev.mac, nickname: input.value }),
    });
    refresh();
  };
  input.addEventListener("blur", save);
  input.addEventListener("keydown", e => {
    if (e.key === "Enter") save();
    if (e.key === "Escape") { done = true; refresh(); }
  });
}

async function refresh() {
  const res = await fetch("/api/devices");
  if (res.status === 401) { location = "/login"; return; }
  const data = await res.json();
  serverNow = data.now;
  scanInterval = data.scan_interval_sec;
  lastDevices = data.devices;
  if (data.summary) {
    const s = data.summary;
    document.getElementById("whosHome").textContent =
      `${s.online} device${s.online === 1 ? "" : "s"} online (${s.tracked_online} tracked)`;
  }
  if (document.activeElement !== slider) {
    slider.value = data.offline_after_misses;
    missesLabel.textContent = missesText(slider.value);
  }
  if (document.activeElement !== quietStart) quietStart.value = data.quiet_hours?.start ?? "";
  if (document.activeElement !== quietEnd) quietEnd.value = data.quiet_hours?.end ?? "";
  renderDetection(data.sniffer_status);

  const tbody = document.getElementById("devices");
  tbody.replaceChildren(...data.devices.map(d => {
    const tr = document.createElement("tr");
    tr.className = d.online ? "online" : "offline";
    tr.dataset.mac = d.mac;
    const statusCell = td(d.online ? "online" : "offline");
    statusCell.style.cursor = "pointer";
    statusCell.title = "Click for join/leave history";
    statusCell.onclick = () => toggleHistory(d.mac);
    const nickCell = td(d.nickname || d.auto_name || "—", "nick");
    nickCell.title = "click to rename, right-click to reset";
    nickCell.onclick = () => editNickname(nickCell, d);
    nickCell.oncontextmenu = (e) => {
      e.preventDefault();
      fetch("/api/nickname", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ mac: d.mac, nickname: "" }),
      }).then(refresh);
    };
    const sel = document.createElement("select");
    sel.innerHTML = '<option value="0">Off</option><option value="1">All</option><option value="2">New-only</option>';
    sel.value = d.notify;
    sel.title = "Notify mode";
    sel.onchange = () => fetch("/api/notify", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ mac: d.mac, notify: Number(sel.value) }),
    });
    const chkCell = document.createElement("td");
    chkCell.append(sel);
    tr.append(statusCell, nickCell, td(d.ip), td(d.mac),
              td(d.vendor || ""), td(ago(d.first_seen)),
              td(d.online ? "—" : ago(d.last_seen)), chkCell);
    return tr;
  }));
  renderExpansion();

  document.getElementById("events").replaceChildren(...data.events.map(e => {
    const li = document.createElement("li");
    li.textContent = `${e.kind === "join" ? "Joined" : "Left"}: ${name(e)} — ${ago(e.ts)}`;
    return li;
  }));
}

refresh();
setInterval(refresh, 10000);
</script>
</body>
</html>
